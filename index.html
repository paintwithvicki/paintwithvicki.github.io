<!DOCTYPE html>
<html>
<head>
  <title>My Art</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background-color: #111;
      color: white;
      text-align: center;
    }

    header {
      padding: 40px;
      font-size: 32px;
      font-weight: bold;
    }

    .gallery {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      padding: 20px;
    }

    .gallery img {
      width: 300px;
      margin: 15px;
      border-radius: 10px;
      transition: 0.3s;
    }

    .gallery img:hover {
      transform: scale(1.05);
    }

    .about {
      padding: 40px;
      max-width: 600px;
      margin: auto;
      font-size: 18px;
      line-height: 1.5;
    }

    .contact {
      padding: 30px;
      font-size: 18px;
    }

    a {
      color: #00ffff;
      text-decoration: none;
    }
  </style>
</head>

<body>

  <header>
    Your Name Art
  </header>

  <div class="gallery">
    <img src="https://via.placeholder.com/300">
    <img src="https://via.placeholder.com/300">
    <img src="https://via.placeholder.com/300">
    <img src="https://via.placeholder.com/300">
  </div>

  <div class="about">
    <h2>About</h2>
    <p>
      I am an artist creating original works and prints.
      My style focuses on [your style here].
    </p>
  </div>

  <div class="contact">
    <h2>Contact</h2>
    <p>Email me at: your@email.com</p>
    <p>Instagram: <a href="#">@yourhandle</a></p>
  </div>

</body>
</html>
