<!DOCTYPE html>
<html>
<head>
  <title>Shop - Paintings</title>

  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      background: #142a4a;
      color: white;
      text-align: center;
    }

    /* TOP NAV */
    .navbar {
      position: fixed;
      top: 0;
      width: 100%;
      display: flex;
      justify-content: center;
      gap: 40px;
      padding: 14px;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(8px);
      z-index: 1000;
    }

    .navbar a {
      color: white;
      text-decoration: none;
      font-weight: bold;
    }

    h1 {
      padding: 100px 20px 20px;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 25px;
      padding: 40px;
      max-width: 1100px;
      margin: auto;
    }

    .card {
      background: rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .card img {
      width: 100%;
      border-radius: 8px;
    }

    .card p {
      margin-top: 10px;
      font-weight: bold;
    }

    /* ZOOM OVERLAY */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .overlay img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 10px;
    }

    /* BACK BUTTON (floating) */
    .back-btn {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: white;
      color: black;
      padding: 10px 14px;
      border-radius: 6px;
      font-weight: bold;
      text-decoration: none;
      font-size: 14px;
      z-index: 1000;
    }

    /* BOTTOM NAV */
    .bottom-nav {
      margin: 60px 0;
    }

    .bottom-nav a {
      display: inline-block;
      margin: 10px;
      padding: 10px 16px;
      background: white;
      color: black;
      text-decoration: none;
      border-radius: 6px;
      font-weight: bold;
      font-size: 14px;
    }

  </style>
</head>

<body>

<!-- TOP NAV -->
<div class="navbar">
  <a href="index.html">Home</a>
  <a href="gallery.html">Shop</a>
</div>

<h1>Shop Paintings</h1>

<!-- GRID -->
<div class="grid">

  <div class="card" onclick="zoom(this)">
    <img src="https://via.placeholder.com/400">
    <p>Painting 1</p>
  </div>

  <div class="card" onclick="zoom(this)">
    <img src="https://via.placeholder.com/400">
    <p>Painting 2</p>
  </div>

  <div class="card" onclick="zoom(this)">
    <img src="https://via.placeholder.com/400">
    <p>Painting 3</p>
  </div>

  <div class="card" onclick="zoom(this)">
    <img src="https://via.placeholder.com/400">
    <p>Painting 4</p>
  </div>

  <div class="card" onclick="zoom(this)">
    <img src="https://via.placeholder.com/400">
    <p>Painting 5</p>
  </div>

</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <a href="index.html">Home</a>
  <a href="#top">Back to Top</a>
</div>

<!-- BACK BUTTON -->
<a class="back-btn" href="index.html">← Back</a>

<!-- ZOOM -->
<div class="overlay" id="overlay" onclick="closeZoom()">
  <img id="zoomImg">
</div>

<script>
  function zoom(el) {
    const img = el.querySelector("img");
    document.getElementById("zoomImg").src = img.src;
    document.getElementById("overlay").style.display = "flex";
  }

  function closeZoom() {
    document.getElementById("overlay").style.display = "none";
  }
</script>

</body>
</html>
