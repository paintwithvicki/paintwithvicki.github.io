<!DOCTYPE html>
<html>
<head>
  <title>Shop</title>

  <style>
    body {
      margin: 0;
      font-family: Georgia, serif;
      background: #142a4a;
      color: white;
      text-align: center;
    }

    h1 {
      padding: 80px 20px 20px;
    }

    /* GRID */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 25px;
      padding: 40px;
      max-width: 1100px;
      margin: auto;
    }

    .card {
      background: rgba(255,255,255,0.06);
      border-radius: 10px;
      padding: 10px;
      cursor: pointer;
      transition: 0.3s;
    }

    .card:hover {
      transform: scale(1.03);
    }

    .card img {
      width: 100%;
      border-radius: 8px;
    }

    .card p {
      margin-top: 10px;
      font-weight: bold;
    }

    /* ZOOM */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.85);
      display: none;
      align-items: center;
      justify-content: center;
      z-index: 999;
    }

    .overlay img {
      max-width: 90%;
      max-height: 90%;
      border-radius: 10px;
    }

  </style>
</head>

<body>

<h1>Shop Paintings</h1>

<div class="grid">

  <div class="card" onclick="zoom(this)">
    <img src="https://via.placeholder.com/400">
    <p>Painting 1</p>
  </div>

  <div class="card" onclick="zoom(this)">
    <img src="https://via.placeholder.com/400">
    <p>Painting 2</p>
  </div>

  <div class="card" onclick="zoom(this)">
    <img src="https://via.placeholder.com/400">
    <p>Painting 3</p>
  </div>

  <div class="card" onclick="zoom(this)">
    <img src="https://via.placeholder.com/400">
    <p>Painting 4</p>
  </div>

  <div class="card" onclick="zoom(this)">
    <img src="https://via.placeholder.com/400">
    <p>Painting 5</p>
  </div>

</div>

<div class="overlay" id="overlay" onclick="closeZoom()">
  <img id="zoomImg">
</div>

<script>
  function zoom(el) {
    const img = el.querySelector("img");
    document.getElementById("zoomImg").src = img.src;
    document.getElementById("overlay").style.display = "flex";
  }

  function closeZoom() {
    document.getElementById("overlay").style.display = "none";
  }
</script>

</body>
</html>
